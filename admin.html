<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель — UrbanStore</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="header">
    <div class="container header__container">
      <a href="index.html" class="header__logo">
        <span class="header__logo-text">UrbanStore Admin</span>
      </a>
      <div class="header__actions">
        <span id="admin-user" class="header__user"></span>
        <button id="admin-logout" class="header__logout" data-i18n="admin.logout">🚪 Выйти</button>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <h1 class="page-title" data-i18n="admin.title">Панель управления</h1>
      <div id="admin-container"></div>
    </div>
  </main>

  <footer class="footer" role="contentinfo">
    <div class="container footer__container">
      <p class="footer__text" data-i18n="footer.demo">📦 Демонстрационный проект интернет-магазина</p>
      <p class="footer__credit"><span data-i18n="footer.developer">Разработчик: Анастасия М. |</span> <a href="https://t.me/asyalapa" class="footer__link">@asyalapa</a></p>
    </div>
  </footer>

  <div class="notification" id="toast"></div>

  <script type="module" src="js/main.js"></script>
</body>

</html>

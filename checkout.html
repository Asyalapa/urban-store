<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оформление заказа — UrbanStore</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="header">
    <div class="container header__container">
      <a href="index.html" class="header__logo">
        <span class="header__logo-text">UrbanStore</span>
      </a>
      <div class="header__actions">
        <a href="wishlist.html" class="header__action-link" aria-label="Избранное">
          <span class="header__action-icon" aria-hidden="true">❤️</span>
          <span class="header__action-badge" id="wishlist-count">0</span>
        </a>
        <a href="cart.html" class="header__action-link" aria-label="Корзина">
          <span class="header__action-icon" aria-hidden="true">🛒</span>
          <span class="header__action-badge" id="cart-count">0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <h1 class="page-title" data-i18n="checkout.title">Оформление заказа</h1>

      <div class="checkout-layout">
        <div class="checkout-layout__form" id="checkout-container"></div>
        <div class="checkout-layout__summary" id="order-summary"></div>
      </div>

      <div class="checkout-actions">
        <button type="submit" form="checkout-form" class="button button--primary button--large">
          <span data-i18n="checkout.confirm">Подтвердить заказ</span>
        </button>
      </div>
    </div>
  </main>

  <footer class="footer" role="contentinfo">
    <div class="container footer__container">
      <p class="footer__text" data-i18n="footer.demo">📦 Демонстрационный проект интернет-магазина</p>
      <p class="footer__credit"><span data-i18n="footer.developer">Разработчик: Анастасия М. |</span> <a href="https://t.me/asyalapa" class="footer__link">@asyalapa</a></p>
    </div>
  </footer>

  <div class="notification" id="toast"></div>

  <script type="module" src="js/main.js"></script>
</body>

</html>
